services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=legal_orchestrator
      - DB_USERNAME=legal_user
      - DB_PASSWORD=secure_password_here
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/var/www/html
      - ./.agent/skills/legal-counsel:/var/www/html/.agent/skills/legal-counsel:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - legal
    mem_limit: 8g
    cpus: '4'
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legal_orchestrator
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: secure_password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_user -d legal_orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - legal
    mem_limit: 8g
    cpus: '4'
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - legal
    mem_limit: 4g
    cpus: '2'
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    command: php artisan horizon
    environment:
      - APP_ENV=local
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_DATABASE=legal_orchestrator
      - DB_USERNAME=legal_user
      - DB_PASSWORD=secure_password_here
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/var/www/html
      - ./.agent/skills/legal-counsel:/var/www/html/.agent/skills/legal-counsel:ro
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - legal
    mem_limit: 4g
    cpus: '2'
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '2'
          memory: 4G

volumes:
  postgres_data:
  redis_data:

networks:
  legal:
    driver: bridge
