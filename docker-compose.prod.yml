# Production override for Saudi Legal Orchestrator
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    restart: unless-stopped

  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  worker:
    restart: unless-stopped
