<!-- Error Log Viewer -->
<div class="min-h-screen bg-[#f8f6f3] font-sans">
  <header class="bg-[#1e3a5f] text-white px-6 py-4">
    <h1 class="text-xl font-semibold">Error Log</h1>
  </header>
  <main class="max-w-5xl mx-auto p-6">
    <div class="flex gap-4 mb-6">
      <select class="border border-[#e2e8f0] rounded-lg px-3 py-2">
        <option>All Agents</option>
      </select>
      <select class="border border-[#e2e8f0] rounded-lg px-3 py-2">
        <option>All Error Types</option>
      </select>
      <button class="px-4 py-2 border border-[#1e3a5f] text-[#1e3a5f] rounded-lg">Export</button>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-[#e2e8f0] overflow-hidden">
      <table class="w-full">
        <thead class="bg-[#f8f6f3] text-[#718096] text-sm">
          <tr>
            <th class="text-left p-4">Agent</th>
            <th class="text-left p-4">Type</th>
            <th class="text-left p-4">Details</th>
            <th class="text-left p-4">Fix Applied</th>
          </tr>
        </thead>
        <tbody class="text-[#2d3748] text-sm">
          <tr class="border-t border-[#e2e8f0]">
            <td class="p-4">Statute Matcher</td>
            <td class="p-4"><span class="px-2 py-1 bg-[#d69e2e]/20 text-[#d69e2e] rounded">low_confidence</span></td>
            <td class="p-4">Confidence 0.65 &lt; 0.70</td>
            <td class="p-4">Used fiqh fallback</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
