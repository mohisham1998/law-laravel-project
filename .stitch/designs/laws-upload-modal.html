<!-- Laws Upload Modal -->
<div class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
  <div class="bg-white rounded-xl shadow-lg max-w-lg w-full p-6">
    <h3 class="text-xl font-semibold text-[#2d3748] mb-4">Upload Required Laws</h3>
    <p class="text-[#718096] text-sm mb-6">Phase 1 identified the following Saudi laws. Upload each before starting Phase 2.</p>
    <div class="space-y-4 mb-6">
      <div class="flex items-center justify-between p-4 bg-[#f8f6f3] rounded-lg">
        <span class="font-medium">نظام الإثبات</span>
        <span class="text-[#276749] text-sm">Uploaded</span>
      </div>
      <div class="flex items-center justify-between p-4 bg-[#f8f6f3] rounded-lg">
        <span class="font-medium">نظام المرافعات الشرعية</span>
        <input type="file" accept=".txt,.md" class="text-sm">
      </div>
    </div>
    <div class="flex justify-end gap-4">
      <button class="px-4 py-2 border border-[#e2e8f0] rounded-lg">Cancel</button>
      <button class="px-6 py-2 bg-[#1e3a5f] text-white rounded-lg">Start Phase 2</button>
    </div>
  </div>
</div>
