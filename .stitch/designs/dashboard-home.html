<!-- Dashboard Home - Saudi Legal Case Orchestrator -->
<!-- DESIGN: Navy #1e3a5f, Gold #c9a227, Background #f8f6f3 -->
<div class="min-h-screen bg-[#f8f6f3] font-sans">
  <header class="bg-[#1e3a5f] text-white px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-semibold">Saudi Legal Orchestrator</h1>
    <div class="flex gap-4">
      <a href="/settings" class="hover:underline">Settings</a>
      <button class="px-4 py-2 bg-[#c9a227] rounded-lg text-[#1e3a5f] font-medium">Logout</button>
    </div>
  </header>
  <main class="max-w-7xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-semibold text-[#2d3748]">Dashboard</h2>
      <a href="/cases/new" class="px-6 py-3 bg-[#1e3a5f] text-white rounded-lg font-medium hover:bg-[#152a45]">New Case</a>
    </div>
    <div class="grid grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl p-6 shadow-sm border border-[#e2e8f0]">
        <p class="text-[#718096] text-sm">Total Cases</p>
        <p class="text-2xl font-bold text-[#1e3a5f]" data-bind="total">0</p>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-[#e2e8f0]">
        <p class="text-[#718096] text-sm">Processing</p>
        <p class="text-2xl font-bold text-[#d69e2e]" data-bind="processing">0</p>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-[#e2e8f0]">
        <p class="text-[#718096] text-sm">Completed</p>
        <p class="text-2xl font-bold text-[#276749]" data-bind="completed">0</p>
      </div>
      <div class="bg-white rounded-xl p-6 shadow-sm border border-[#e2e8f0]">
        <p class="text-[#718096] text-sm">Failed</p>
        <p class="text-2xl font-bold text-[#c53030]" data-bind="failed">0</p>
      </div>
    </div>
    <div class="bg-white rounded-xl shadow-sm border border-[#e2e8f0] overflow-hidden">
      <div class="p-4 border-b border-[#e2e8f0] flex gap-4">
        <select class="border border-[#e2e8f0] rounded-lg px-3 py-2 text-sm">
          <option>All Statuses</option>
        </select>
      </div>
      <table class="w-full">
        <thead class="bg-[#f8f6f3] text-[#718096] text-sm">
          <tr>
            <th class="text-left p-4">Title</th>
            <th class="text-left p-4">Status</th>
            <th class="text-left p-4">Progress</th>
            <th class="text-left p-4">Created</th>
            <th class="text-right p-4">Actions</th>
          </tr>
        </thead>
        <tbody class="text-[#2d3748]">
          <tr class="border-t border-[#e2e8f0] hover:bg-[#f8f6f3]">
            <td class="p-4 font-medium">Case Title</td>
            <td class="p-4"><span class="px-2 py-1 rounded-full text-xs bg-[#d69e2e]/20 text-[#d69e2e]">Processing</span></td>
            <td class="p-4">
              <div class="w-24 h-2 bg-[#e2e8f0] rounded-full overflow-hidden">
                <div class="h-full bg-[#c9a227] rounded-full" style="width:66%"></div>
              </div>
            </td>
            <td class="p-4 text-[#718096]">2026-03-14</td>
            <td class="p-4 text-right">
              <a href="/cases/123" class="text-[#1e3a5f] hover:underline mr-2">View</a>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="p-4 border-t border-[#e2e8f0] flex justify-between text-sm text-[#718096]">
        <span>Page 1 of 1</span>
        <div class="flex gap-2"></div>
      </div>
    </div>
  </main>
</div>
