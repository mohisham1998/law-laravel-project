<!-- New Case Form -->
<div class="min-h-screen bg-[#f8f6f3] font-sans">
  <header class="bg-[#1e3a5f] text-white px-6 py-4">
    <h1 class="text-xl font-semibold">Saudi Legal Orchestrator</h1>
  </header>
  <main class="max-w-3xl mx-auto p-6">
    <h2 class="text-2xl font-semibold text-[#2d3748] mb-6">Create New Case</h2>
    <form class="bg-white rounded-xl p-6 shadow-sm border border-[#e2e8f0] space-y-6">
      <div>
        <label class="block text-sm font-medium text-[#2d3748] mb-2">Case Title</label>
        <input type="text" placeholder="قضية رقم ..." class="w-full border border-[#e2e8f0] rounded-lg px-4 py-3">
      </div>
      <div>
        <label class="block text-sm font-medium text-[#2d3748] mb-2">Intake Text / Case Description</label>
        <textarea rows="8" placeholder="Describe the case..." class="w-full border border-[#e2e8f0] rounded-lg px-4 py-3"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-[#2d3748] mb-2">Documents (.txt, .md, max 10MB each)</label>
        <div class="border-2 border-dashed border-[#e2e8f0] rounded-lg p-8 text-center text-[#718096]">
          Drag & drop or click to upload
        </div>
      </div>
      <div class="flex gap-4">
        <button type="submit" class="px-6 py-3 bg-[#1e3a5f] text-white rounded-lg font-medium">Create Case</button>
        <a href="/dashboard" class="px-6 py-3 border border-[#e2e8f0] rounded-lg">Cancel</a>
      </div>
    </form>
  </main>
</div>
